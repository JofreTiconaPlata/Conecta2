<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="./css/styles.css" />

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

  <body>
    <main class="app-container">
      <section class="chat-card">
        <header class="chat-header">
          <h1>Conecta2</h1>
          <p>Chat colaborativo en tiempo real con WebSocket</p>
        </header>

<section class="connection-panel">
  <label for="username">Nombre de usuario</label>
  <div class="connection-row">
    <input
      type="text"
      id="username"
      placeholder="Ingresa tu nombre o usa uno temporal"
      maxlength="30"
    />
    <button id="connect-button">Conectar</button>
  </div>
  <small id="connection-status">Estado: desconectado</small>

  <div class="google-login-section">
    <p>O inicia sesión con Google</p>
    <button id="firebase-google-login-button" type="button">
      Iniciar sesión con Google
    </button>
      </div>
        </section>

        <section id="chat-messages" class="chat-messages"></section>

        <form id="chat-form" class="chat-form">
          <input
            type="text"
            id="message-input"
            placeholder="Escribe un mensaje..."
            maxlength="500"
            disabled
          />
          <button type="submit" id="send-button" disabled>Enviar</button>
        </form>
      </section>
    </main>

<script src="./js/utils.js"></script>
<script src="./js/chat-ui.js"></script>
<script src="./js/websocket.js"></script>
<script src="./js/firebase-config.js"></script>

<script src="./js/app.js"></script>
