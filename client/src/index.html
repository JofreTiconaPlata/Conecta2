<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conecta2</title>
    <link rel="stylesheet" href="./css/styles.css" />

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <script>
      window.FIREBASE_API_KEY = "AIzaSyBoHb_DySx12gW2QjzZ9E3Mn1816F6o5Sk";
      window.FIREBASE_AUTH_DOMAIN = "websocketcolab.firebaseapp.com";
      window.FIREBASE_PROJECT_ID = "websocketcolab";
      window.FIREBASE_APP_ID = "1:665650478406:web:0082c34ccdf36e387e7947";
    </script>
  </head>
  <body>
    <main class="app-container">
      <section id="access-screen" class="access-card">
        <header class="access-header">
          <h1>Conecta2</h1>
          <p>Chat colaborativo en tiempo real</p>
        </header>

        <section class="access-panel">
          <label for="guest-name">Ingresar como invitado</label>
          <input
            type="text"
            id="guest-name"
            placeholder="Escribe tu nombre"
            maxlength="30"
          />

          <button id="guest-access-button" type="button">
            Acceder al chat
          </button>

          <div class="access-divider">
            <span>o</span>
          </div>

          <button id="firebase-google-login-button" type="button">
            Iniciar sesión con Google
          </button>
        </section>
      </section>

      <section id="chat-screen" class="chat-card hidden">
        <header class="chat-header">
          <h1>Conecta2</h1>
          <p id="welcome-user">Bienvenido</p>
        </header>

        <section class="connection-panel">
          <small id="connection-status">Estado: desconectado</small>
        </section>

        <section id="chat-messages" class="chat-messages"></section>

        <form id="chat-form" class="chat-form">
          <input
            type="text"
            id="message-input"
            placeholder="Escribe un mensaje..."
            maxlength="500"
            disabled
          />
          <button type="submit" id="send-button" disabled>Enviar</button>
        </form>
      </section>
    </main>

    <script src="./js/utils.js"></script>
    <script src="./js/chat-ui.js"></script>
    <script src="./js/websocket.js"></script>
    <script src="./js/firebase-config.js"></script>
    <script src="./js/auth-ui.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
